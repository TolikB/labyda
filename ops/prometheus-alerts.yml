groups:
  - name: arbitrage-engine
    rules:
      - alert: ArbitrageEngineNotReady
        expr: arbitrage_ready == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Arbitrage engine is not ready
      - alert: ArbitrageRiskPaused
        expr: arbitrage_risk_paused == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: Arbitrage risk controller is paused
      - alert: ArbitrageReconciliationDrift
        expr: increase(arbitrage_reconciliation_drift_total[5m]) > 0
        labels:
          severity: critical
        annotations:
          summary: Reconciliation drift detected
      - alert: ArbitrageMarketDataGap
        expr: increase(arbitrage_market_data_events_total{event=~"sequence_gaps|checksum_mismatches"}[5m]) > 0
        labels:
          severity: warning
        annotations:
          summary: Market-data sequence or checksum failure detected
