x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

services:
  postgres:
    image: postgres:16.6-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: arbitrage
      POSTGRES_USER: arbitrage
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arbitrage -d arbitrage"]
      interval: 5s
      timeout: 3s
      retries: 20
    logging: *default-logging
    mem_limit: 1536m
    cpus: 2.0
    pids_limit: 256

  migrate:
    build:
      context: .
      target: runtime
    entrypoint: ["alembic"]
    command: ["upgrade", "head"]
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    logging: *default-logging
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 128

  test:
    profiles: ["test"]
    build:
      context: .
      target: test
    entrypoint: ["python"]
    command: ["-m", "pytest", "-q", "-p", "no:cacheprovider"]
    env_file:
      - .env.production
    environment:
      MYPY_CACHE_DIR: /tmp/mypy-cache
      PYTHONPYCACHEPREFIX: /tmp/pycache
      RUFF_CACHE_DIR: /tmp/ruff-cache
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    logging: *default-logging
    mem_limit: 1g
    cpus: 2.0
    pids_limit: 256

  bot:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - ./config.production.json:/run/config/config.json:ro
      - ${OFFSITE_BACKUP_DIR:?set OFFSITE_BACKUP_DIR to an external disk or network mount}:/var/backups/offsite:ro
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:9108:9108"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9108/health/ready', timeout=3)",
        ]
      interval: 15s
      timeout: 5s
      start_period: 120s
      retries: 4
    logging: *default-logging
    mem_limit: 1536m
    cpus: 2.0
    pids_limit: 256

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./ops/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/prometheus-alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      bot:
        condition: service_started
    logging: *default-logging
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 128

  alertmanager:
    image: prom/alertmanager:v0.28.1
    restart: unless-stopped
    command: ["--config.file=/etc/alertmanager/alertmanager.yml", "--storage.path=/alertmanager"]
    volumes:
      - ${ALERTMANAGER_CONFIG_FILE:?set ALERTMANAGER_CONFIG_FILE}:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    logging: *default-logging
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 128

  postgres-backup:
    image: postgres:16.6
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      BACKUP_DIR: /var/backups/arbitrage
      BACKUP_METRICS_DIR: /var/lib/node_exporter/textfile
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-21600}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      OFFSITE_BACKUP_DIR: /var/backups/offsite
    entrypoint: ["/bin/bash", "/opt/arbitrage/postgres_backup.sh", "--loop"]
    volumes:
      - ./ops/postgres_backup.sh:/opt/arbitrage/postgres_backup.sh:ro
      - ./ops/postgres_restore_drill.sh:/opt/arbitrage/postgres_restore_drill.sh:ro
      - postgres-backups:/var/backups/arbitrage
      - ${OFFSITE_BACKUP_DIR:?set OFFSITE_BACKUP_DIR to an external disk or network mount}:/var/backups/offsite
      - backup-metrics:/var/lib/node_exporter/textfile
    depends_on:
      postgres:
        condition: service_healthy
    logging: *default-logging
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 128

  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    command:
      - --path.rootfs=/host
      - --collector.textfile.directory=/var/lib/node_exporter/textfile
    volumes:
      - /:/host:ro,rslave
      - backup-metrics:/var/lib/node_exporter/textfile:ro
    ports:
      - "127.0.0.1:9100:9100"
    logging: *default-logging
    mem_limit: 128m
    cpus: 0.25
    pids_limit: 64

volumes:
  postgres-data:
  prometheus-data:
  alertmanager-data:
  postgres-backups:
  backup-metrics:
